# ── SSH 基础默认设置 ──────────────────────────────────────
# 由 lazyssh 管理，通过 Include 引入 ~/.ssh/config

# 连接保活
Host *
    ServerAliveInterval 60
    ServerAliveCountMax 3
    TCPKeepAlive yes

# 连接复用
    ControlMaster auto
    ControlPath ~/.ssh/sockets/%r@%h-%p
    ControlPersist 10m

# 认证
    AddKeysToAgent yes
    IdentitiesOnly yes
    PubkeyAuthentication yes
    PasswordAuthentication no

# 安全
    StrictHostKeyChecking ask
    HashKnownHosts no
    FingerprintHash sha256

# 日志
    LogLevel ERROR
