unbind C-a
unbind C-b
set -g prefix C-]
bind C-] send-prefix

unbind r
bind r source-file ~/.config/tmux/tmux.conf

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi
# set-option -sa terminal-overrides ',XXX:Tc'
set -g default-terminal "xterm-256color"
set -as terminal-features ",*256col*:RGB"
set -as terminal-overrides ",*256col*:Tc"
set -gq allow-passthrough on

# pane border style
# set -g pane-border-lines single # heavy double single simple
# set -g pane-border-status bottom
# set -g pane-border-format " #[fg=#{@thm_overlay_0}]#{pane_index} "
# set -g pane-border-format "#[fg=#{@thm_overlay_0}]"
# set -g pane-border-style 'fg=#{@thm_mantle},bg=default'
# set -g pane-active-border-style 'fg=#{@thm_mauve},bg=default'


# set-hook -g after-select-window 'run-shell -b "tmux display-message -p \"#{pane_current_command}\" | grep -q nvim && tmux send-keys C-l || true"'
# set-hook -g after-select-pane 'run-shell -b "tmux display-message -p \"#{pane_current_command}\" | grep -q nvim && tmux send-keys C-l || true"'

unbind s
bind-key -T prefix s display-popup -E -w 75% -h 85% "~/.config/tmux/scripts/tmux-session-tree-fzf.sh"
unbind f
bind-key -T prefix f display-popup -E -w 75% -h 85% "~/.local/bin/common/tmux-sessionizer"
unbind e
bind-key -T prefix e display-popup -E -w 75% -h 85% "~/.config/tmux/scripts/npm-run-fzf.sh"
unbind g
bind-key -T prefix g display-popup -E -w 75% -h 85% "lazygit"

