[mgr]
ratio = [1, 4, 3]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
sort_translit = false
linemode = "none"
show_hidden = false
show_symlink = true
scrolloff = 5
mouse_events = ["click", "scroll"]
title_format = "Yazi: {cwd}"

[preview]
wrap = "no"
tab_size = 2
max_width = 600
max_height = 900
cache_dir = ""
image_delay = 30
image_filter = "lanczos3"
image_quality = 75

[opener]
edit = [
  { run = '${EDITOR:=vi} %s', block = true, for = "unix" },
  { run = 'code %s', orphan = true, for = "windows" },
]
open = [
  { run = 'cmd.exe /c start "" "$(wslpath -w "$1")"', orphan = true, desc = "Open with Windows", for = "unix" },
  { run = 'open %s', desc = "Open", for = "macos" },
  { run = 'start "" %s', orphan = true, for = "windows" },
]
image = [{ run = 'sxiv %s', desc = "Image", for = "linux" }]
krita = [{ run = 'krita %s', desc = "Krita", for = "linux" }]
reveal = [
  { run = 'open -R "$1"', desc = "Reveal", for = "macos" },
  { run = 'explorer /select, "%1"', orphan = true, desc = "Reveal", for = "windows" },
  { run = 'explorer.exe "$(wslpath -w "$1")"', orphan = true, desc = "Windows Explorer", for = "unix" },
  { run = '''exiftool "$1"; echo "Press enter to exit"; read''', block = true, desc = "Show EXIF", for = "unix" },
]
extract = [
  { run = 'ya pub extract --list %s', desc = "Extract here", for = "unix" },
  { run = 'unar %s', desc = "Extract here", for = "windows" },
]
play = [
  { run = 'cmd.exe /c start "" "$(wslpath -w "$1")"', orphan = true, desc = "Windows default player", for = "unix" },
  { run = 'vlc %s', orphan = true, for = "unix" },
  { run = 'mpv %s', orphan = true, for = "windows" },
  { run = '''mediainfo "$1"; echo "Press enter to exit"; read''', block = true, desc = "Show media info", for = "unix" },
]

[open]
prepend_rules = [
  { mime = "inode/directory", use = [
    "edit",
    "open",
    "reveal",
  ] },
  { mime = "text/*", use = [
    "edit",
    "reveal",
  ] },
  { mime = "image/*", use = [
    "image",
    "krita",
    "open",
    "reveal",
  ] },
  { mime = "video/*", use = [
    "play",
    "reveal",
  ] },
  { mime = "audio/*", use = [
    "play",
    "reveal",
  ] },
  { mime = "inode/x-empty", use = [
    "edit",
    "reveal",
  ] },
  { mime = "application/json", use = [
    "edit",
    "reveal",
  ] },
  { mime = "*/javascript", use = [
    "edit",
    "reveal",
  ] },
  { mime = "application/zip", use = [
    "extract",
    "reveal",
  ] },
  { mime = "application/gzip", use = [
    "extract",
    "reveal",
  ] },
  { mime = "application/x-tar", use = [
    "extract",
    "reveal",
  ] },
  { mime = "application/x-bzip", use = [
    "extract",
    "reveal",
  ] },
  { mime = "application/x-bzip2", use = [
    "extract",
    "reveal",
  ] },
  { mime = "application/x-7z-compressed", use = [
    "extract",
    "reveal",
  ] },
  { mime = "application/x-rar", use = [
    "extract",
    "reveal",
  ] },
  { mime = "application/xz", use = [
    "extract",
    "reveal",
  ] },
]
append_rules = [{ url = "*", use = ["open", "reveal"] }]

[tasks]
micro_workers = 10
macro_workers = 5
bizarre_retry = 3
suppress_preload = false
image_alloc = 536870912  # 512MB
image_bound = [0, 0]

[plugin]
prepend_previewers = [{ mime = "text/markdown", run = "glow" }]

prepend_preloaders = []

[log]
enabled = false
