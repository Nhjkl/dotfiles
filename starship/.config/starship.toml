"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
scan_timeout = 60

# format = """
# [ΌΓ╢](surface0)\
# $os\
# $username\
# [ΌΓ░](bg:peach fg:surface0)\
# $directory\
# [ΌΓ░](fg:peach bg:green)\
# $git_branch\
# $git_status\
# [ΌΓ░](fg:green bg:teal)\
# $c\
# $rust\
# $golang\
# $nodejs\
# $php\
# $java\
# $kotlin\
# $haskell\
# $python\
# [ΌΓ░](fg:teal bg:blue)\
# $docker_context\
# [ΌΓ░](fg:blue bg:purple)\
# $time\
# [ΌΓ┤ ](fg:purple)\
# $line_break$character"""

format = """
[ΌΓ╢](surface0)\
$os\
$username\
$directory\
$git_branch\
$git_status\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$time\
[ΌΓ┤ ](fg:surface0)\
$line_break$character"""

palette = 'catppuccin_mocha'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
orange = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
# surface0 = "#313244"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[os]
disabled = false
style = "bg:surface0 fg:green"

[os.symbols]
Windows = "≤░Ξ▓"
Ubuntu = "≤░ΧΙ"
SUSE = "ΎΝΦ"
Raspbian = "≤░Ρ┐"
Mint = "≤░μφ"
Macos = "ΌεΣ"
Manjaro = "ΎΝΤ"
Linux = "≤░Ν╜"
Gentoo = "≤░μρ"
Fedora = "≤░μδ"
Alpine = "ΎΝΑ"
Amazon = "ΎΚ░"
Android = "ΌεΟ"
Arch = "≤░μΘ"
Artix = "≤░μΘ"
CentOS = "ΎΝΕ"
Debian = "≤░μγ"
Redhat = "≤▒Εδ"
RedHatEnterprise = "≤▒Εδ"

[username]
show_always = true
style_user = "bold bg:surface0 fg:green"
style_root = "bold bg:surface0 fg:green"
format = '[ $user ]($style)'

[directory]
style = "bold fg:teal bg:surface0"
format = "[$path]($style)"
# truncation_length = 3
# truncation_symbol = "έΑο/"

[directory.substitutions]
"Documents" = "≤░Ιβ "
"Downloads" = "ΎΑβ "
"Music" = "≤░ζγ "
"Pictures" = "ΎΑ╛ "
"Developer" = "≤░▓Μ "

[git_branch]
symbol = "ΎΡα"
style = "bg:surface0"
format = '[[ $symbol $branch](bold fg:sky bg:surface0)]($style)'

[git_status]
style = "bg:surface0"
format = '[[ ($all_status$ahead_behind)](bold fg:sky bg:surface0)]($style)'
conflicted = 'ΎΒ▒'
ahead = '≤░δΔ'
behind = '≤░δΑ'
diverged = '≤░Χε'
up_to_date = 'ΎΖΛ'
untracked = 'ΎΒβ'
stashed = '≤░υγ'
modified = 'Ότη'
renamed = 'ΎΣγ'
deleted = '≤░χΙ'
staged = 'ΎΔ╛'

[nodejs]
symbol = "Όεα"
style = "bg:teal"
format = '[[ $symbol( $version)](bold fg:sapphire bg:surface0)]($style)'

[c]
symbol = "Όαη "
style = "bg:teal"
format = '[[ $symbol( $version)](bold fg:sapphire bg:surface0)]($style)'

[rust]
symbol = "Όηρ"
style = "bg:teal"
format = '[[ $symbol( $version)](bold fg:sapphire bg:surface0)]($style)'

[golang]
symbol = "Όαπ"
style = "bg:teal"
format = '[[ $symbol( $version)](bold fg:sapphire bg:surface0)]($style)'

[php]
symbol = "ΌαΙ"
style = "bg:teal"
format = '[[ $symbol( $version)](bold fg:sapphire bg:surface0)]($style)'

[java]
symbol = "ΌΚΨ "
style = "bg:teal"
format = '[[ $symbol( $version)](bold fg:sapphire bg:surface0)]($style)'

[kotlin]
symbol = "Όα┤"
style = "bg:teal"
format = '[[ $symbol( $version)](bold fg:sapphire bg:surface0)]($style)'

[haskell]
symbol = "Όαθ"
style = "bg:teal"
format = '[[ $symbol( $version)](bold fg:sapphire bg:surface0)]($style)'

[python]
symbol = "ΌαΗ"
style = "bg:teal"
format = '[[ $symbol( $version)](bold fg:sapphire bg:surface0)]($style)'

[docker_context]
symbol = "ΎΝΙ"
style = "bg:mantle"
format = '[[ $symbol( $context)](bold fg:sapphire bg:surface0)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:peach"
format = '[[ ΎΡ║ $time ](bold fg:blue bg:surface0)]($style)'

[line_break]
disabled = false

[character]
success_symbol = "[ ≤░χψ](bold green)"
error_symbol = "[ ≤░Λι](bold red)"
